<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Parasmani Enterprises</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar scrolled"><div class="container nav-inner">
    <a href="index.html" class="nav-logo"><div class="logo-icon">⚡</div><div>Parasmani <span>Enterprises</span></div></a>
    <div class="nav-actions">
      <!-- Language Toggle -->
      <div class="lang-toggle">
        <button data-lang="en">EN</button>
        <button data-lang="hi">HI</button>
      </div>
      <button id="darkModeToggle" class="nav-btn">☀️</button>
      <a href="index.html" class="nav-btn">🏠 Home</a>
    </div>
  </div></nav>

  <div class="auth-page">
    <div class="auth-card">
      <div class="logo"><div class="logo-icon">⚡</div><h2>Parasmani <span>Login</span></h2><p>Sign in to your account</p></div>
      <div class="role-tabs">
        <button class="active" data-role="customer" onclick="switchRole('customer',this)">👤 Customer</button>
        <button data-role="staff" onclick="switchRole('staff',this)">🏷️ Staff</button>
        <button data-role="admin" onclick="switchRole('admin',this)">🔑 Admin</button>
      </div>
      <form id="loginForm">
        <div class="form-group"><label>Username / Email</label><input type="text" id="loginUser" placeholder="Enter username or email" required></div>
        <div class="form-group"><label>Password</label><input type="password" id="loginPass" placeholder="Enter password" required></div>
        <div id="loginError" style="color:var(--red);font-size:.85rem;display:none;text-align:center;margin-bottom:8px"></div>
        <button type="submit" class="btn-submit">Sign In</button>
      </form>
      <div class="toggle" id="customerToggle">Don't have an account? <a id="registerLink" href="register.html">Register</a></div>
      <div style="margin-top:16px;text-align:center;font-size:.78rem;color:var(--text3)" id="demoInfo">
        <strong>Demo Credentials:</strong><br>
        Admin: admin / admin123<br>
        Staff: staff1 / 12345
      </div>
    </div>
  </div>

  <!-- LIVE CHAT WIDGET -->
  <div class="chat-widget">
    <button class="chat-toggle">💬<span class="chat-dot"></span></button>
    <div class="chat-box">
      <div class="chat-box-header">Parasmani Support <button onclick="document.querySelector('.chat-box').classList.remove('show')">✕</button></div>
      <div class="chat-messages"></div>
      <div class="chat-input">
        <input type="text" placeholder="Type a message...">
        <button class="chat-send">Send</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    let currentRole = 'customer';
    const redirectParam = new URLSearchParams(location.search).get('redirect');
    // Pass redirect param to register link
    if (redirectParam) {
      const rl = document.getElementById('registerLink');
      if (rl) rl.href = 'register.html?redirect=' + redirectParam;
    }
    function switchRole(role, btn) {
      currentRole = role;
      document.querySelectorAll('.role-tabs button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('customerToggle').style.display = role === 'customer' ? 'block' : 'none';
      document.getElementById('demoInfo').style.display = role !== 'customer' ? 'block' : 'none';
    }
    document.getElementById('loginForm').addEventListener('submit', e => {
      e.preventDefault();
      const user = document.getElementById('loginUser').value.trim();
      const pass = document.getElementById('loginPass').value;
      const errEl = document.getElementById('loginError');
      errEl.style.display = 'none';
      if (currentRole === 'admin') {
        const admin = DB.get('admin', { user: 'admin', pass: 'admin123' });
        if (user === admin.user && pass === admin.pass) {
          DB.set('current_user', { role: 'admin', username: 'admin', name: 'Admin' });
          logActivity('Admin logged in');
          location.href = 'admin-dashboard.html';
          return;
        }
      } else if (currentRole === 'staff') {
        const staff = DB.get('staff', []);
        const s = staff.find(st => st.username === user && st.password === pass);
        if (s) {
          DB.set('current_user', { role: 'staff', username: s.username, name: s.name, empId: s.empId, rfidId: s.rfidId, id: s.id });
          logActivity(s.name + ' (Staff) logged in');
          location.href = 'staff-dashboard.html';
          return;
        }
      } else {
        const users = DB.get('users', []);
        const u = users.find(us => (us.email === user || us.username === user) && us.password === pass);
        if (u) {
          DB.set('current_user', { role: 'customer', username: u.username, name: u.name, email: u.email, phone: u.phone });
          logActivity(u.name + ' logged in');
          // Redirect back to checkout if came from there
          location.href = redirectParam === 'checkout' ? 'checkout.html' : 'index.html';
          return;
        }
      }
      errEl.textContent = 'Invalid username or password';
      errEl.style.display = 'block';
    });
  </script>
</body>
</html>
