<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Parasmani Enterprises</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar scrolled"><div class="container nav-inner">
    <a href="index.html" class="nav-logo"><div class="logo-icon">⚡</div><div>Parasmani <span>Enterprises</span></div></a>
    <div class="nav-actions">
      <!-- Language Toggle -->
      <div class="lang-toggle">
        <button data-lang="en">EN</button>
        <button data-lang="hi">HI</button>
      </div>
      <button id="darkModeToggle" class="nav-btn">☀️</button>
      <a href="index.html" class="nav-btn">🏠 Home</a>
    </div>
  </div></nav>
  <div class="auth-page">
    <div class="auth-card">
      <div class="logo"><div class="logo-icon">⚡</div><h2>Create <span>Account</span></h2><p>Register to shop with us</p></div>
      <form id="registerForm">
        <div class="form-group"><label>Full Name</label><input type="text" id="regName" required></div>
        <div class="form-group"><label>Email</label><input type="email" id="regEmail" required></div>
        <div class="form-group"><label>Phone</label><input type="tel" id="regPhone" required></div>
        <div class="form-group"><label>Password</label><input type="password" id="regPass" required minlength="4"></div>
        <div class="form-group"><label>Confirm Password</label><input type="password" id="regConfirm" required></div>
        <!-- OTP Simulation -->
        <div class="form-group"><label>Verify OTP (enter any 4 digits)</label><input type="text" id="regOtp" maxlength="4" placeholder="1234" required></div>
        <div id="regError" style="color:var(--red);font-size:.85rem;display:none;text-align:center;margin-bottom:8px"></div>
        <button type="submit" class="btn-submit">Create Account</button>
      </form>
      <div class="toggle">Already have an account? <a id="loginLink" href="login.html">Login</a></div>
    </div>
  </div>

  <!-- LIVE CHAT WIDGET -->
  <div class="chat-widget">
    <button class="chat-toggle">💬<span class="chat-dot"></span></button>
    <div class="chat-box">
      <div class="chat-box-header">Parasmani Support <button onclick="document.querySelector('.chat-box').classList.remove('show')">✕</button></div>
      <div class="chat-messages"></div>
      <div class="chat-input">
        <input type="text" placeholder="Type a message...">
        <button class="chat-send">Send</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    const redirectParam = new URLSearchParams(location.search).get('redirect');
    if (redirectParam) {
      const ll = document.getElementById('loginLink');
      if (ll) ll.href = 'login.html?redirect=' + redirectParam;
    }
    document.getElementById('registerForm').addEventListener('submit', e => {
      e.preventDefault();
      const name = document.getElementById('regName').value;
      const email = document.getElementById('regEmail').value;
      const phone = document.getElementById('regPhone').value;
      const pass = document.getElementById('regPass').value;
      const confirm = document.getElementById('regConfirm').value;
      const otp = document.getElementById('regOtp').value;
      const errEl = document.getElementById('regError');
      errEl.style.display = 'none';
      if (pass !== confirm) { errEl.textContent = 'Passwords do not match'; errEl.style.display = 'block'; return; }
      if (otp.length !== 4) { errEl.textContent = 'Enter 4-digit OTP'; errEl.style.display = 'block'; return; }
      const users = DB.get('users', []);
      if (users.find(u => u.email === email)) { errEl.textContent = 'Email already registered'; errEl.style.display = 'block'; return; }
      const user = { id: generateId(), name, email, phone, username: email, password: pass, created: new Date().toISOString(), totalOrders: 0, totalSpent: 0, address: '', city: '', pincode: '' };
      users.push(user); DB.set('users', users);
      DB.set('current_user', { role: 'customer', username: email, name, email, phone });
      logActivity(name + ' registered');
      toast('Account created!');
      const dest = redirectParam === 'checkout' ? 'checkout.html' : 'index.html';
      setTimeout(() => location.href = dest, 1000);
    });
  </script>
</body>
</html>
